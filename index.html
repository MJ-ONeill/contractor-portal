<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Contractor's Complete Job Management | ZAR</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: system-ui, 'Segoe UI', 'Inter', sans-serif;
    }

    body {
      background: #e9eef3;
      padding: 20px;
    }

    .app-container {
      max-width: 1600px;
      margin: 0 auto;
    }

    .card {
      background: white;
      border-radius: 24px;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.05);
      padding: 1.5rem;
      margin-bottom: 1.5rem;
    }

    .dashboard-header,
    .flex-between {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 16px;
    }

    h1 {
      font-size: 1.8rem;
      font-weight: 700;
      background: linear-gradient(135deg, #1e2b3c, #0f3b2c);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
    }

    h2 {
      font-size: 1.3rem;
      font-weight: 600;
      color: #1e2f3a;
      border-left: 4px solid #2c7a4d;
      padding-left: 12px;
      margin: 1rem 0 0.8rem 0;
    }

    h3 {
      font-size: 1.1rem;
      font-weight: 600;
      margin: 0.8rem 0 0.5rem 0;
      color: #2c3e44;
      cursor: pointer;
      user-select: none;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    button {
      background: #2c7a4d;
      color: white;
      border: none;
      padding: 8px 16px;
      border-radius: 40px;
      font-weight: 500;
      cursor: pointer;
      transition: 0.2s;
      font-size: 0.8rem;
    }

    button:hover {
      background: #1e5f3a;
      transform: scale(0.97);
    }

    .btn-outline {
      background: transparent;
      border: 1px solid #bdc4cc;
      color: #2c3e44;
    }

    .btn-outline:hover {
      background: #f0f2f5;
      transform: none;
    }

    .btn-danger {
      background: #b91c1c;
    }

    .btn-danger:hover {
      background: #991b1b;
    }

    .btn-sm {
      padding: 4px 10px;
      font-size: 0.7rem;
    }

    .btn-warning {
      background: #e67e22;
    }

    .btn-warning:hover {
      background: #d35400;
    }

    .project-tile {
      background: white;
      border-radius: 20px;
      padding: 1rem;
      border: 1px solid #e2e8f0;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
    }

    .project-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 16px;
      margin-top: 1rem;
    }

    .project-tile {
      flex: 1 1 260px;
    }

    .project-tile h4 {
      font-size: 1.2rem;
      font-weight: 700;
    }

    .total-cost {
      font-weight: 700;
      font-size: 1.2rem;
      color: #0f5c3a;
      margin: 8px 0;
    }

    .badge {
      background: #eef2f6;
      border-radius: 20px;
      padding: 2px 10px;
      font-size: 0.7rem;
      display: inline-block;
    }

    .badge-success {
      background: #d1fae5;
      color: #065f46;
    }

    .summary-bar {
      background: #f0fdf4;
      padding: 14px;
      border-radius: 20px;
      margin: 12px 0;
    }

    .tab-bar {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      border-bottom: 1px solid #e2e8f0;
      padding-bottom: 10px;
      margin-bottom: 16px;
    }

    .tab-btn {
      background: transparent;
      color: #4a5568;
      box-shadow: none;
    }

    .tab-btn.active {
      background: #2c7a4d;
      color: white;
    }

    .tab-content {
      display: none;
    }

    .tab-content.active {
      display: block;
    }

    .worker-card,
    .client-card,
    .note-card,
    .doc-card {
      background: #f9fafb;
      border-radius: 16px;
      padding: 12px;
      margin-bottom: 12px;
      border-left: 3px solid #2c7a4d;
    }

    .inline-form {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
      margin: 12px 0;
    }

    input,
    select,
    textarea {
      padding: 8px 12px;
      border-radius: 32px;
      border: 1px solid #cbd5e1;
      font-size: 0.85rem;
    }

    textarea {
      border-radius: 16px;
      width: 100%;
    }

    .item-row {
      background: white;
      border-radius: 12px;
      padding: 8px 12px;
      margin: 6px 0;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 8px;
      border: 1px solid #eef2f6;
    }

    .item-actions {
      display: flex;
      gap: 6px;
    }

    .back-link {
      background: #eef2f6;
      padding: 6px 14px;
      border-radius: 40px;
      cursor: pointer;
      font-size: 0.85rem;
    }

    .collapsible-header {
      cursor: pointer;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
    }

    .collapsible-content {
      display: none;
      margin-top: 10px;
      padding-top: 10px;
      border-top: 1px solid #e2e8f0;
    }

    .collapsible-content.expanded {
      display: block;
    }

    .collapse-icon {
      font-size: 0.8rem;
      color: #666;
    }

    .doc-link {
      color: #2c7a4d;
      text-decoration: none;
      font-weight: 500;
    }

    .doc-link:hover {
      text-decoration: underline;
    }

    @media (max-width: 640px) {
      body {
        padding: 12px;
      }

      .card {
        padding: 1rem;
      }
    }
  </style>
</head>

<body>
  <div class="app-container">
    <!-- DASHBOARD VIEW -->
    <div id="dashboardView">
      <div class="card">
        <div class="dashboard-header">
          <h1>🛠️ Contractor's Complete Job Manager</h1>
        </div>
        <div class="flex-between" style="margin-bottom: 16px; flex-wrap:wrap; gap:12px;">
          <input type="text" id="newProjectName" placeholder="New project name..." style="flex:2; min-width:180px;">
          <button id="addProjectBtn">➕ Create Project</button>
        </div>
        <h2>📁 All Projects</h2>
        <div id="projectsList" class="project-grid"></div>
      </div>
    </div>

    <!-- PROJECT DETAIL VIEW -->
    <div id="projectView" style="display: none;">
      <div class="card">
        <div class="flex-between" style="margin-bottom: 16px;">
          <span class="back-link" id="backToDashboardBtn">← Back to Dashboard</span>
          <button id="deleteEntireProjectBtn" class="btn-danger btn-sm">🗑️ Delete Project</button>
          <button id="exportProjectBtn" class="btn-outline btn-sm">📎 Export CSV</button>
        </div>

        <div class="flex-between">
          <h1 id="projectDetailName"></h1>
          <button id="toggleFinishedBtn" class="btn-sm"></button>
        </div>

        <!-- Profit Summary -->
        <div class="summary-bar" id="profitSummary"></div>

        <!-- TABS -->
        <div class="tab-bar">
          <button class="tab-btn active" data-tab="expenses">💰 Expenses</button>
          <button class="tab-btn" data-tab="workers">👷 Workers & Advances</button>
          <button class="tab-btn" data-tab="clients">🏢 Clients & Payments</button>
          <button class="tab-btn" data-tab="tasks">✓ Task Checklist</button>
          <button class="tab-btn" data-tab="logs">📝 Daily Logs</button>
          <button class="tab-btn" data-tab="notes">📋 Notes</button>
          <button class="tab-btn" data-tab="docs">📎 Documents</button>
        </div>

        <!-- EXPENSES TAB -->
        <div id="tab-expenses" class="tab-content active">
          <div style="background: #f1f5f9; border-radius: 20px; padding: 1rem; margin-bottom: 1rem;">
            <h3>➕ Add Expense</h3>
            <div class="inline-form">
              <input type="text" id="newExpenseCategory" placeholder="Category" style="flex:1;">
              <input type="text" id="newExpenseDesc" placeholder="Description" style="flex:2;">
              <input type="number" id="newExpenseQty" placeholder="Qty" value="1" style="width:70px;">
              <input type="number" id="newExpensePrice" placeholder="Price each" step="0.01" style="width:100px;">
              <input type="text" id="newExpenseSupplier" placeholder="Supplier" style="flex:1;">
              <button id="addExpenseBtn">+ Add</button>
            </div>
          </div>
          <input type="text" id="expenseSearch" placeholder="🔍 Search expenses..." style="width:100%; margin-bottom:12px;">
          <div id="expensesList"></div>
        </div>

        <!-- WORKERS TAB -->
        <div id="tab-workers" class="tab-content">
          <div class="inline-form">
            <input type="text" id="workerName" placeholder="Worker name">
            <input type="text" id="workerRole" placeholder="Role">
            <input type="number" id="workerRate" placeholder="Hourly rate (ZAR)" step="0.01">
            <button id="addWorkerBtn">+ Add Worker</button>
          </div>
          <div id="workersList"></div>

          <h3>💰 Record Advance Payment</h3>
          <div class="inline-form">
            <select id="advanceWorkerSelect"></select>
            <input type="number" id="advanceAmount" placeholder="Amount (ZAR)">
            <input type="date" id="advanceDate">
            <button id="addAdvanceBtn">Record Advance</button>
          </div>

          <h3>⏱️ Log Hours Worked</h3>
          <div class="inline-form">
            <select id="hoursWorkerSelect"></select>
            <input type="date" id="hoursDate">
            <input type="number" id="hoursWorked" placeholder="Hours" step="0.5">
            <button id="addHoursBtn">Log Hours</button>
          </div>
        </div>

        <!-- CLIENTS TAB -->
        <div id="tab-clients" class="tab-content">
          <div class="inline-form">
            <input type="text" id="clientName" placeholder="Client name">
            <input type="text" id="clientContact" placeholder="Phone/Email">
            <input type="text" id="clientAddress" placeholder="Address">
            <button id="addClientBtn">+ Add Client</button>
          </div>
          <div id="clientsList"></div>

          <h3>💰 Record Payment Received</h3>
          <div class="inline-form">
            <select id="paymentClientSelect"></select>
            <input type="number" id="paymentAmount" placeholder="Amount (ZAR)">
            <input type="date" id="paymentDate">
            <button id="addPaymentBtn">Record Payment</button>
          </div>
          <div id="paymentHistory"></div>
        </div>

        <!-- TASKS TAB -->
        <div id="tab-tasks" class="tab-content">
          <div class="inline-form">
            <input type="text" id="newTask" placeholder="Task description" style="flex:2;">
            <button id="addTaskBtn">+ Add Task</button>
          </div>
          <div id="tasksList"></div>
        </div>

        <!-- DAILY LOGS TAB -->
        <div id="tab-logs" class="tab-content">
          <div class="inline-form">
            <input type="date" id="logDate">
            <textarea id="logText" placeholder="Daily notes (weather, delays, progress...)" rows="2" style="flex:2;"></textarea>
            <button id="addLogBtn">+ Add Log</button>
          </div>
          <div id="logsList"></div>
        </div>

        <!-- NOTES TAB (Collapsible notes) -->
        <div id="tab-notes" class="tab-content">
          <div style="background: #f1f5f9; border-radius: 20px; padding: 1rem; margin-bottom: 1rem;">
            <h3>📝 Add New Note</h3>
            <div class="inline-form">
              <input type="text" id="newNoteTitle" placeholder="Note title" style="flex:1;">
              <textarea id="newNoteContent" placeholder="Note content..." rows="2" style="flex:2;"></textarea>
              <button id="addNoteBtn">+ Add Note</button>
            </div>
          </div>
          <div id="notesList"></div>
        </div>

        <!-- DOCUMENTS TAB (Clickable links) -->
        <div id="tab-docs" class="tab-content">
          <div style="background: #f1f5f9; border-radius: 20px; padding: 1rem; margin-bottom: 1rem;">
            <h3>📎 Add Document Link</h3>
            <div class="inline-form">
              <input type="text" id="newDocTitle" placeholder="Document title/description" style="flex:1;">
              <input type="text" id="newDocLink" placeholder="Link (Google Drive, PDF, etc.)" style="flex:2;">
              <button id="addDocBtn">+ Add Document</button>
            </div>
            <p class="badge" style="margin-top:8px;">💡 Tip: Upload files to Google Drive, then paste the shareable link here</p>
          </div>
          <div id="docsList"></div>
        </div>
      </div>
    </div>
  </div>

  <script>
    let projects = [];
    let currentProjectId = null;
    let noteExpandStates = {};

    function uid() { return Date.now() + '-' + Math.random().toString(36).substring(2, 6); }
    function formatMoney(v) { return new Intl.NumberFormat('en-ZA', { style: 'currency', currency: 'ZAR' }).format(v); }
    function save() { localStorage.setItem('contractor_dashboard_v2', JSON.stringify(projects)); }

    function loadData() {
      const stored = localStorage.getItem('contractor_dashboard_v2');
      if (stored) {
        try {
          projects = JSON.parse(stored);
          projects.forEach(p => {
            p.expenses = p.expenses || [];
            p.workers = p.workers || [];
            p.clients = p.clients || [];
            p.tasks = p.tasks || [];
            p.dailyLogs = p.dailyLogs || [];
            p.notes = p.notes || [];
            p.documents = p.documents || [];
            p.payments = p.payments || [];
            p.finished = p.finished || false;
          });
        } catch (e) { projects = []; }
      }
      if (!projects.length) projects = [];
      save();
    }

    function computeProjectProfit(proj) {
      let expenses = proj.expenses?.reduce((s, e) => s + (e.qty * e.price), 0) || 0;
      let wages = proj.workers?.reduce((s, w) => s + (w.totalHoursWage || 0), 0) || 0;
      let payments = proj.payments?.reduce((s, p) => s + p.amount, 0) || 0;
      return { expenses, wages, totalCost: expenses + wages, payments, profit: payments - (expenses + wages) };
    }

    function renderDashboard() {
      const container = document.getElementById('projectsList');
      if (!projects.length) { container.innerHTML = '<div class="card">✨ No projects yet. Create one above! ✨</div>'; return; }
      container.innerHTML = projects.map(proj => {
        const profit = computeProjectProfit(proj);
        return `<div class="project-tile">
        <div class="flex-between"><h4>${escapeHtml(proj.name)}</h4>${proj.finished ? '<span class="badge badge-success">✓ Finished</span>' : '<span class="badge">⚙️ Active</span>'}</div>
        <div class="total-cost">Expenses: ${formatMoney(profit.expenses + profit.wages)}</div>
        <div>💰 Received: ${formatMoney(profit.payments)} | Profit: ${formatMoney(profit.profit)}</div>
        <div style="margin-top:10px;"><button class="view-project-btn" data-id="${proj.id}">🔍 Open</button> <button class="remove-project-btn" data-id="${proj.id}" class="btn-danger btn-sm">🗑️</button></div>
      </div>`;
      }).join('');
      document.querySelectorAll('.view-project-btn').forEach(btn => btn.addEventListener('click', () => openProject(btn.dataset.id)));
      document.querySelectorAll('.remove-project-btn').forEach(btn => btn.addEventListener('click', () => { if (confirm('Delete?')) { projects = projects.filter(p => p.id !== btn.dataset.id); save(); renderDashboard(); if (currentProjectId === btn.dataset.id) showDashboard(); } }));
    }

    function toggleNoteExpand(noteId) {
      const content = document.querySelector(`.note-content[data-note-id="${noteId}"]`);
      const icon = document.querySelector(`.note-icon[data-note-id="${noteId}"]`);
      if (content) {
        const isExpanded = content.classList.contains('expanded');
        if (isExpanded) {
          content.classList.remove('expanded');
          content.style.display = 'none';
          if (icon) icon.textContent = '▶';
          noteExpandStates[noteId] = false;
        } else {
          content.classList.add('expanded');
          content.style.display = 'block';
          if (icon) icon.textContent = '▼';
          noteExpandStates[noteId] = true;
        }
      }
    }

    function renderProjectView(id) {
      const proj = projects.find(p => p.id === id);
      if (!proj) return showDashboard();
      currentProjectId = id;
      document.getElementById('projectDetailName').innerHTML = `📋 ${escapeHtml(proj.name)}`;
      const profit = computeProjectProfit(proj);
      document.getElementById('profitSummary').innerHTML = `
      <div class="flex-between"><span>💸 Total Expenses: ${formatMoney(profit.expenses)}</span><span>👷 Wages: ${formatMoney(profit.wages)}</span></div>
      <div class="flex-between"><span>💰 Payments Received: ${formatMoney(profit.payments)}</span><span>📈 Estimated Profit: <strong>${formatMoney(profit.profit)}</strong></span></div>
    `;
      const finishedBtn = document.getElementById('toggleFinishedBtn');
      finishedBtn.textContent = proj.finished ? '✅ Mark Active' : '🏁 Mark Finished';
      finishedBtn.onclick = () => { proj.finished = !proj.finished; save(); renderProjectView(id); };

      renderExpenses(proj);
      renderWorkers(proj);
      renderClients(proj);
      renderTasks(proj);
      renderLogs(proj);
      renderNotes(proj);
      renderDocuments(proj);
      renderPayments(proj);
    }

    function renderExpenses(proj) {
      let html = '';
      const search = document.getElementById('expenseSearch')?.value.toLowerCase() || '';
      const filtered = proj.expenses?.filter(e => e.category?.toLowerCase().includes(search) || e.desc?.toLowerCase().includes(search)) || [];
      filtered.forEach(exp => {
        html += `<div class="item-row">
        <div><strong>${escapeHtml(exp.category)}</strong>: ${escapeHtml(exp.desc)}<br><small>${exp.qty} x ${formatMoney(exp.price)} = ${formatMoney(exp.qty * exp.price)} | ${exp.supplier ? '📦 ' + escapeHtml(exp.supplier) : ''}</small></div>
        <div class="item-actions">
          <button class="edit-expense-btn btn-sm btn-warning" data-id="${exp.id}">✏️</button>
          <button class="delete-expense-btn btn-sm btn-outline" data-id="${exp.id}">✖</button>
        </div>
      </div>`;
      });
      if (!filtered.length) html = '<div class="badge">No expenses yet.</div>';
      document.getElementById('expensesList').innerHTML = html;
      document.querySelectorAll('.edit-expense-btn').forEach(btn => btn.addEventListener('click', () => editExpense(proj, btn.dataset.id)));
      document.querySelectorAll('.delete-expense-btn').forEach(btn => btn.addEventListener('click', () => { proj.expenses = proj.expenses.filter(e => e.id !== btn.dataset.id); save(); renderProjectView(proj.id); }));
    }

    function editExpense(proj, expId) {
      const exp = proj.expenses.find(e => e.id === expId);
      if (!exp) return;
      const newCat = prompt('Edit category:', exp.category);
      const newDesc = prompt('Edit description:', exp.desc);
      const newQty = parseFloat(prompt('Edit quantity:', exp.qty));
      const newPrice = parseFloat(prompt('Edit price each:', exp.price));
      const newSupplier = prompt('Edit supplier:', exp.supplier || '');
      if (newCat) exp.category = newCat;
      if (newDesc) exp.desc = newDesc;
      if (!isNaN(newQty) && newQty > 0) exp.qty = newQty;
      if (!isNaN(newPrice) && newPrice > 0) exp.price = newPrice;
      exp.supplier = newSupplier;
      save(); renderProjectView(proj.id);
    }

    function editWorker(proj, workerId) {
      const worker = proj.workers.find(w => w.id === workerId);
      if (!worker) return;
      const newName = prompt('Edit worker name:', worker.name);
      const newRole = prompt('Edit role:', worker.role);
      const newRate = parseFloat(prompt('Edit hourly rate (ZAR):', worker.rate));
      if (newName) worker.name = newName;
      if (newRole) worker.role = newRole;
      if (!isNaN(newRate) && newRate > 0) worker.rate = newRate;
      save(); renderProjectView(proj.id);
    }

    function editClient(proj, clientId) {
      const client = proj.clients.find(c => c.id === clientId);
      if (!client) return;
      const newName = prompt('Edit client name:', client.name);
      const newContact = prompt('Edit contact:', client.contact);
      const newAddress = prompt('Edit address:', client.address);
      if (newName) client.name = newName;
      if (newContact !== null) client.contact = newContact;
      if (newAddress !== null) client.address = newAddress;
      save(); renderProjectView(proj.id);
    }

    function editTask(proj, taskId) {
      const task = proj.tasks.find(t => t.id === taskId);
      if (!task) return;
      const newText = prompt('Edit task:', task.text);
      if (newText) task.text = newText;
      save(); renderProjectView(proj.id);
    }

    function editLog(proj, logId) {
      const log = proj.dailyLogs.find(l => l.id === logId);
      if (!log) return;
      const newDate = prompt('Edit date (YYYY-MM-DD):', log.date);
      const newText = prompt('Edit log entry:', log.text);
      if (newDate) log.date = newDate;
      if (newText) log.text = newText;
      save(); renderProjectView(proj.id);
    }

    function editNote(proj, noteId) {
      const note = proj.notes.find(n => n.id === noteId);
      if (!note) return;
      const newTitle = prompt('Edit note title:', note.title);
      const newContent = prompt('Edit note content:', note.content);
      if (newTitle) note.title = newTitle;
      if (newContent !== null) note.content = newContent;
      save(); renderProjectView(proj.id);
    }

    function editDocument(proj, docId) {
      const doc = proj.documents.find(d => d.id === docId);
      if (!doc) return;
      const newTitle = prompt('Edit document title:', doc.title);
      const newLink = prompt('Edit document link:', doc.link);
      if (newTitle) doc.title = newTitle;
      if (newLink !== null) doc.link = newLink;
      save(); renderProjectView(proj.id);
    }

    function editPayment(proj, paymentId) {
      const payment = proj.payments.find(p => p.id === paymentId);
      if (!payment) return;
      const newAmount = parseFloat(prompt('Edit amount:', payment.amount));
      const newDate = prompt('Edit date (YYYY-MM-DD):', payment.date);
      if (!isNaN(newAmount) && newAmount > 0) payment.amount = newAmount;
      if (newDate) payment.date = newDate;
      save(); renderProjectView(proj.id);
    }

    function renderWorkers(proj) {
      let html = '';
      proj.workers?.forEach(w => {
        const owed = (w.totalHoursWage || 0) - (w.advances || 0);
        html += `<div class="worker-card">
        <div><strong>${escapeHtml(w.name)}</strong> (${escapeHtml(w.role)}) - ${formatMoney(w.rate)}/hr</div>
        <div>📊 Hours: ${w.totalHours || 0} | 💵 Wages: ${formatMoney(w.totalHoursWage || 0)} | 💸 Advances: ${formatMoney(w.advances || 0)} | ⚖️ Balance: ${formatMoney(owed)}</div>
        <div class="item-actions" style="margin-top:8px;">
          <button class="edit-worker-btn btn-sm btn-warning" data-id="${w.id}">✏️</button>
          <button class="delete-worker-btn btn-sm btn-outline" data-id="${w.id}">Remove</button>
        </div>
      </div>`;
      });
      document.getElementById('workersList').innerHTML = html || '<div>No workers</div>';
      document.querySelectorAll('.edit-worker-btn').forEach(btn => btn.addEventListener('click', () => editWorker(proj, btn.dataset.id)));
      document.querySelectorAll('.delete-worker-btn').forEach(btn => btn.addEventListener('click', () => { proj.workers = proj.workers.filter(w => w.id !== btn.dataset.id); save(); renderProjectView(proj.id); }));

      const workerSelect = document.getElementById('advanceWorkerSelect');
      const hoursSelect = document.getElementById('hoursWorkerSelect');
      if (workerSelect && proj.workers) {
        workerSelect.innerHTML = proj.workers.map(w => `<option value="${w.id}">${escapeHtml(w.name)}</option>`).join('');
        hoursSelect.innerHTML = proj.workers.map(w => `<option value="${w.id}">${escapeHtml(w.name)}</option>`).join('');
      }
    }

    function renderClients(proj) {
      let html = '';
      proj.clients?.forEach(c => {
        html += `<div class="client-card">
        <strong>${escapeHtml(c.name)}</strong><br>${escapeHtml(c.contact)}<br>${escapeHtml(c.address)}
        <div class="item-actions" style="margin-top:8px;">
          <button class="edit-client-btn btn-sm btn-warning" data-id="${c.id}">✏️</button>
          <button class="delete-client-btn btn-sm btn-outline" data-id="${c.id}">Remove</button>
        </div>
      </div>`;
      });
      document.getElementById('clientsList').innerHTML = html || '<div>No clients</div>';
      document.querySelectorAll('.edit-client-btn').forEach(btn => btn.addEventListener('click', () => editClient(proj, btn.dataset.id)));
      document.querySelectorAll('.delete-client-btn').forEach(btn => btn.addEventListener('click', () => { proj.clients = proj.clients.filter(c => c.id !== btn.dataset.id); save(); renderProjectView(proj.id); }));

      const paymentSelect = document.getElementById('paymentClientSelect');
      if (paymentSelect && proj.clients) paymentSelect.innerHTML = '<option value="">Select client</option>' + proj.clients.map(c => `<option value="${c.id}">${escapeHtml(c.name)}</option>`).join('');
    }

    function renderTasks(proj) {
      let html = '';
      proj.tasks?.forEach(t => {
        html += `<div class="item-row">
        <input type="checkbox" ${t.completed ? 'checked' : ''} class="task-check" data-id="${t.id}">
        <span style="${t.completed ? 'text-decoration:line-through' : ''}">${escapeHtml(t.text)}</span>
        <div class="item-actions">
          <button class="edit-task-btn btn-sm btn-warning" data-id="${t.id}">✏️</button>
          <button class="delete-task-btn btn-sm btn-outline" data-id="${t.id}">🗑️</button>
        </div>
      </div>`;
      });
      document.getElementById('tasksList').innerHTML = html || '<div>No tasks</div>';
      document.querySelectorAll('.task-check').forEach(cb => cb.addEventListener('change', (e) => { const task = proj.tasks.find(t => t.id === cb.dataset.id); if (task) { task.completed = cb.checked; save(); renderProjectView(proj.id); } }));
      document.querySelectorAll('.edit-task-btn').forEach(btn => btn.addEventListener('click', () => editTask(proj, btn.dataset.id)));
      document.querySelectorAll('.delete-task-btn').forEach(btn => btn.addEventListener('click', () => { proj.tasks = proj.tasks.filter(t => t.id !== btn.dataset.id); save(); renderProjectView(proj.id); }));
    }

    function renderLogs(proj) {
      let html = '';
      [...(proj.dailyLogs || [])].reverse().forEach(l => {
        html += `<div class="item-row">
        <div><strong>📅 ${l.date}</strong><br>${escapeHtml(l.text)}</div>
        <div class="item-actions">
          <button class="edit-log-btn btn-sm btn-warning" data-id="${l.id}">✏️</button>
          <button class="delete-log-btn btn-sm btn-outline" data-id="${l.id}">✖</button>
        </div>
      </div>`;
      });
      document.getElementById('logsList').innerHTML = html || '<div>No logs</div>';
      document.querySelectorAll('.edit-log-btn').forEach(btn => btn.addEventListener('click', () => editLog(proj, btn.dataset.id)));
      document.querySelectorAll('.delete-log-btn').forEach(btn => btn.addEventListener('click', () => { proj.dailyLogs = proj.dailyLogs.filter(l => l.id !== btn.dataset.id); save(); renderProjectView(proj.id); }));
    }

    function renderNotes(proj) {
      let html = '';
      proj.notes?.forEach(note => {
        const isExpanded = noteExpandStates[note.id] === true;
        const iconSymbol = isExpanded ? '▼' : '▶';
        html += `<div class="note-card">
        <div class="collapsible-header" data-note-id="${note.id}" style="cursor:pointer;">
          <strong>📝 ${escapeHtml(note.title)}</strong>
          <span class="collapse-icon note-icon" data-note-id="${note.id}">${iconSymbol}</span>
        </div>
        <div class="collapsible-content note-content" data-note-id="${note.id}" style="display: ${isExpanded ? 'block' : 'none'};">
          <p style="margin-bottom:8px;">${escapeHtml(note.content)}</p>
          <div class="item-actions">
            <button class="edit-note-btn btn-sm btn-warning" data-id="${note.id}">✏️ Edit</button>
            <button class="delete-note-btn btn-sm btn-outline" data-id="${note.id}">Delete</button>
          </div>
        </div>
      </div>`;
      });
      document.getElementById('notesList').innerHTML = html || '<div class="badge">No notes yet. Add one above.</div>';

      document.querySelectorAll('.collapsible-header').forEach(header => {
        const noteId = header.dataset.noteId;
        header.addEventListener('click', (e) => {
          if (e.target.classList && (e.target.classList.contains('edit-note-btn') || e.target.classList.contains('delete-note-btn'))) return;
          toggleNoteExpand(noteId);
        });
      });
      document.querySelectorAll('.edit-note-btn').forEach(btn => btn.addEventListener('click', () => editNote(proj, btn.dataset.id)));
      document.querySelectorAll('.delete-note-btn').forEach(btn => btn.addEventListener('click', () => { proj.notes = proj.notes.filter(n => n.id !== btn.dataset.id); delete noteExpandStates[btn.dataset.id]; save(); renderProjectView(proj.id); }));
    }

    function renderDocuments(proj) {
      let html = '';
      proj.documents?.forEach(doc => {
        html += `<div class="doc-card">
        <div><strong>📄 ${escapeHtml(doc.title)}</strong></div>
        <div><a href="${escapeHtml(doc.link)}" target="_blank" class="doc-link">🔗 ${escapeHtml(doc.link)}</a></div>
        <div class="item-actions" style="margin-top:8px;">
          <button class="edit-doc-btn btn-sm btn-warning" data-id="${doc.id}">✏️ Edit</button>
          <button class="delete-doc-btn btn-sm btn-outline" data-id="${doc.id}">Delete</button>
        </div>
      </div>`;
      });
      document.getElementById('docsList').innerHTML = html || '<div class="badge">No documents yet. Add a link above.</div>';
      document.querySelectorAll('.edit-doc-btn').forEach(btn => btn.addEventListener('click', () => editDocument(proj, btn.dataset.id)));
      document.querySelectorAll('.delete-doc-btn').forEach(btn => btn.addEventListener('click', () => { proj.documents = proj.documents.filter(d => d.id !== btn.dataset.id); save(); renderProjectView(proj.id); }));
    }

    function renderPayments(proj) {
      let total = proj.payments?.reduce((s, p) => s + p.amount, 0) || 0;
      let html = `<div class="badge badge-success">💰 Total Received: ${formatMoney(total)}</div>`;
      proj.payments?.forEach(p => {
        const client = proj.clients?.find(c => c.id === p.clientId);
        html += `<div class="item-row">
        <div>${formatMoney(p.amount)} from ${client?.name || 'Unknown'} on ${p.date}</div>
        <div class="item-actions">
          <button class="edit-payment-btn btn-sm btn-warning" data-id="${p.id}">✏️</button>
          <button class="delete-payment-btn btn-sm btn-outline" data-id="${p.id}">✖</button>
        </div>
      </div>`;
      });
      document.getElementById('paymentHistory').innerHTML = html;
      document.querySelectorAll('.edit-payment-btn').forEach(btn => btn.addEventListener('click', () => editPayment(proj, btn.dataset.id)));
      document.querySelectorAll('.delete-payment-btn').forEach(btn => btn.addEventListener('click', () => { proj.payments = proj.payments.filter(p => p.id !== btn.dataset.id); save(); renderProjectView(proj.id); }));
    }

    function setupEventDelegation() {
      document.body.addEventListener('click', (e) => {
        const proj = projects.find(p => p.id === currentProjectId);
        if (!proj) return;

        if (e.target.id === 'addExpenseBtn') {
          const cat = document.getElementById('newExpenseCategory')?.value;
          const desc = document.getElementById('newExpenseDesc')?.value;
          const qty = parseFloat(document.getElementById('newExpenseQty')?.value);
          const price = parseFloat(document.getElementById('newExpensePrice')?.value);
          const supplier = document.getElementById('newExpenseSupplier')?.value;
          if (!cat || !desc || isNaN(price)) return alert('Fill category, description and price');
          proj.expenses.push({ id: uid(), category: cat, desc, qty: qty || 1, price, supplier });
          save(); renderProjectView(proj.id);
          document.getElementById('newExpenseCategory').value = '';
          document.getElementById('newExpenseDesc').value = '';
          document.getElementById('newExpenseQty').value = '1';
          document.getElementById('newExpensePrice').value = '';
          document.getElementById('newExpenseSupplier').value = '';
        }
        if (e.target.id === 'addWorkerBtn') {
          const name = document.getElementById('workerName')?.value;
          const role = document.getElementById('workerRole')?.value;
          const rate = parseFloat(document.getElementById('workerRate')?.value);
          if (!name || isNaN(rate)) return alert('Name and rate required');
          proj.workers.push({ id: uid(), name, role, rate, totalHours: 0, totalHoursWage: 0, advances: 0 });
          save(); renderProjectView(proj.id);
          document.getElementById('workerName').value = '';
          document.getElementById('workerRole').value = '';
          document.getElementById('workerRate').value = '';
        }
        if (e.target.id === 'addAdvanceBtn') {
          const wid = document.getElementById('advanceWorkerSelect')?.value;
          const amt = parseFloat(document.getElementById('advanceAmount')?.value);
          const date = document.getElementById('advanceDate')?.value || new Date().toISOString().slice(0, 10);
          const worker = proj.workers?.find(w => w.id === wid);
          if (worker && !isNaN(amt)) { worker.advances = (worker.advances || 0) + amt; save(); renderProjectView(proj.id); document.getElementById('advanceAmount').value = ''; }
          else alert('Select worker and enter amount');
        }
        if (e.target.id === 'addHoursBtn') {
          const wid = document.getElementById('hoursWorkerSelect')?.value;
          const hrs = parseFloat(document.getElementById('hoursWorked')?.value);
          const date = document.getElementById('hoursDate')?.value || new Date().toISOString().slice(0, 10);
          const worker = proj.workers?.find(w => w.id === wid);
          if (worker && !isNaN(hrs) && hrs > 0) {
            worker.totalHours = (worker.totalHours || 0) + hrs;
            worker.totalHoursWage = (worker.totalHours * worker.rate);
            save(); renderProjectView(proj.id);
            document.getElementById('hoursWorked').value = '';
          } else alert('Select worker and enter valid hours');
        }
        if (e.target.id === 'addClientBtn') {
          const name = document.getElementById('clientName')?.value;
          const contact = document.getElementById('clientContact')?.value;
          const address = document.getElementById('clientAddress')?.value;
          if (!name) return alert('Client name required');
          proj.clients.push({ id: uid(), name, contact, address });
          save(); renderProjectView(proj.id);
          document.getElementById('clientName').value = '';
          document.getElementById('clientContact').value = '';
          document.getElementById('clientAddress').value = '';
        }
        if (e.target.id === 'addPaymentBtn') {
          const cid = document.getElementById('paymentClientSelect')?.value;
          const amt = parseFloat(document.getElementById('paymentAmount')?.value);
          const date = document.getElementById('paymentDate')?.value || new Date().toISOString().slice(0, 10);
          if (!cid || isNaN(amt)) return alert('Select client and enter amount');
          proj.payments.push({ id: uid(), clientId: cid, amount: amt, date });
          save(); renderProjectView(proj.id);
          document.getElementById('paymentAmount').value = '';
        }
        if (e.target.id === 'addTaskBtn') {
          const text = document.getElementById('newTask')?.value;
          if (text) { proj.tasks.push({ id: uid(), text, completed: false }); save(); renderProjectView(proj.id); document.getElementById('newTask').value = ''; }
        }
        if (e.target.id === 'addLogBtn') {
          const date = document.getElementById('logDate')?.value || new Date().toISOString().slice(0, 10);
          const text = document.getElementById('logText')?.value;
          if (text) { proj.dailyLogs.push({ id: uid(), date, text }); save(); renderProjectView(proj.id); document.getElementById('logText').value = ''; }
        }
        if (e.target.id === 'addNoteBtn') {
          const title = document.getElementById('newNoteTitle')?.value;
          const content = document.getElementById('newNoteContent')?.value;
          if (title) {
            const newNoteId = uid();
            proj.notes.push({ id: newNoteId, title, content });
            noteExpandStates[newNoteId] = false;
            save(); renderProjectView(proj.id);
            document.getElementById('newNoteTitle').value = '';
            document.getElementById('newNoteContent').value = '';
          } else alert('Enter a note title');
        }
        if (e.target.id === 'addDocBtn') {
          const title = document.getElementById('newDocTitle')?.value;
          const link = document.getElementById('newDocLink')?.value;
          if (title && link) {
            proj.documents.push({ id: uid(), title, link });
            save(); renderProjectView(proj.id);
            document.getElementById('newDocTitle').value = '';
            document.getElementById('newDocLink').value = '';
          } else alert('Enter both title and link');
        }
        if (e.target.id === 'exportProjectBtn') {
          let csv = "Type,Category/Title,Description/Link,Amount,Date\n";
          proj.expenses?.forEach(e => csv += `Expense,${e.category},${e.desc},${e.qty * e.price},\n`);
          proj.payments?.forEach(p => csv += `Payment,,,${p.amount},${p.date}\n`);
          const blob = new Blob([csv], { type: 'text/csv' }); const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = `${proj.name}_export.csv`; a.click();
        }
      });
    }

    function escapeHtml(str) { if (!str) return ''; return str.replace(/[&<>]/g, function (m) { return { '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m]; }); }

    function showDashboard() { document.getElementById('dashboardView').style.display = 'block'; document.getElementById('projectView').style.display = 'none'; renderDashboard(); currentProjectId = null; }
    function openProject(id) { if (projects.find(p => p.id === id)) { currentProjectId = id; document.getElementById('dashboardView').style.display = 'none'; document.getElementById('projectView').style.display = 'block'; renderProjectView(id); } }

    function init() {
      loadData();
      setupEventDelegation();
      document.getElementById('addProjectBtn')?.addEventListener('click', () => { let name = document.getElementById('newProjectName')?.value; if (name) { projects.push({ id: uid(), name, expenses: [], workers: [], clients: [], tasks: [], dailyLogs: [], notes: [], documents: [], payments: [], finished: false }); save(); renderDashboard(); document.getElementById('newProjectName').value = ''; } });
      document.getElementById('backToDashboardBtn')?.addEventListener('click', showDashboard);
      document.getElementById('deleteEntireProjectBtn')?.addEventListener('click', () => { if (currentProjectId && confirm('Delete project?')) { projects = projects.filter(p => p.id !== currentProjectId); save(); showDashboard(); } });
      document.querySelectorAll('.tab-btn').forEach(btn => btn.addEventListener('click', () => { document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active')); document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active')); btn.classList.add('active'); document.getElementById(`tab-${btn.dataset.tab}`)?.classList.add('active'); }));
      showDashboard();
    }
    init();
  </script>
</body>

</html>
